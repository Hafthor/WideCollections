name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack (library only, no tests)
        run: dotnet pack --configuration Release -p:IncludeTests=false --output ./artifacts

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
